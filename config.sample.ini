; ============================================================
;  これは設定の見本ファイルです（さわらなくてOK）。
;  「動作テスト.bat」や「常駐起動.vbs」を初めて起動すると、
;  この見本から config.ini が自動で作られ、メモ帳で開きます。
;  あとは開いたファイルに自分のトークンを貼るだけです。
;  ※ config.ini はGit管理外なので、トークンがGitHubに上がることはありません。
; ============================================================

[asana]
# ★★★ ここだけ各自で書き換えてください ★★★
# Asana個人アクセストークンを発行して貼り付けます。
#   発行手順: https://app.asana.com/0/my-apps を開く
#            →「新しいアクセストークンを作成」→ 名前を付けて作成
#            → 表示されたトークン文字列をコピーして下の token = の右に貼る
# ※このトークンは自分専用です。他人に共有・GitHubにアップしないでください。
token = ここに自分のトークンを貼る

[settings]
# --- ここから下は基本さわらなくてOK（制作・更新プロジェクト用に設定済み）---
workspace_gid = 411141023175498
project_gid = 1143684627593511
status_field_gid = 1143632416165671
status_value_gid = 1143859554156836
# ①チーム内確認待ちアラート：この件数以上でポップアップ
threshold = 2
# 夕方以降はしきい値を下げ、×で閉じても0件になるまで再通知する（例：17時以降は1件でも通知）
# 無効にしたい場合は evening_hour = 24 にする
evening_hour = 17
evening_threshold = 1
# 通知する時間帯（この範囲内だけ通知。9〜22時なら夜22時〜翌朝9時は通知しない）24時間表記
active_start_hour = 9
active_end_hour = 22
# 土日は通知しない（true / false）
quiet_weekend = true
# チェック間隔（分）※テスト時だけ 1 や 0.1 にできます。普段は 10。
interval_minutes = 10

[today_alert]
# ②今日の時間指定タスクアラートの設定
# 有効にするか（true / false）
enabled = true
# 今日期日のタスクで、名前に下記いずれかを含むものを通知（カンマ区切り・自由に追加削除OK）
keywords = AM,PM,午前,午後,時まで,ASAP,至急,マスト,流し込み,表示確認,設定確認
# 「17時」「10:00」などの時刻表記も対象にする（true / false）
match_time = true
# 下記キーワードを含むタスクは、担当者が割り当てられたら通知しない（担当なしのときだけ通知）
assignee_optional_keywords = 流し込み,表示確認,設定確認
# この件数以上で通知（1＝1件でもあれば通知）
threshold = 1
# Statusがこの値になったら通知対象から外す（＝作業完了まで通知し続ける）。カンマ区切り
done_statuses = 作業完了,全て完了
# ②ポップアップに出すひとことアドバイス（この行を消すと既定文になります）
note = 流し込み確認は午前中に対応しましょう
